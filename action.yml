name: "Agent Lint"
description: "Run Claude Code configuration linter"
branding:
  icon: check-circle
  color: blue

inputs:
  version:
    description: "Version of agent-lint to use (e.g., '1.0.0'). Defaults to latest release."
    required: false
    default: ""
  path:
    description: "Path to the repository to lint. Defaults to current directory."
    required: false
    default: "."
  github-token:
    description: "GitHub token for resolving the latest release version. Optional — falls back to github.token automatically."
    required: false
    default: ""
  pedantic:
    description: "Enable pedantic mode: promote warn-listed rules to errors (except length-cap rules). Mutually exclusive with 'all'."
    required: false
    default: "false"
  all:
    description: "Enable all mode: every rule fires as an error, ignoring config overrides. Mutually exclusive with 'pedantic'."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install agent-lint
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
        GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
      run: bash "${{ github.action_path }}/scripts/install.sh"

    - name: Run agent-lint
      shell: bash
      run: |
        args=()
        if [ "${{ inputs.pedantic }}" = "true" ]; then args+=(--pedantic); fi
        if [ "${{ inputs.all }}" = "true" ]; then args+=(--all); fi
        args+=("${{ inputs.path }}")
        agent-lint "${args[@]}"
