name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  auto-tag:
    if: github.event_name == 'push' && github.ref_type != 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-release: ${{ steps.tag.outputs.created }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and validate versions
        id: version
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          CARGO_VERSION=$(awk '/^\[package\]/{found=1} found && /^version/{gsub(/.*= *"/,""); gsub(/".*/,""); print; exit}' Cargo.toml)

          if [ -z "$PKG_VERSION" ] || [ -z "$CARGO_VERSION" ]; then
            echo "::error::Could not read version from package.json ($PKG_VERSION) or Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          if ! echo "$PKG_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version in package.json: $PKG_VERSION"
            exit 1
          fi

          if [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VERSION, Cargo.toml=$CARGO_VERSION"
            exit 1
          fi

          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check and create tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "Tag v${VERSION} already exists, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    needs: [auto-tag]
    if: >-
      github.ref_type == 'tag' ||
      needs.auto-tag.outputs.should-release == 'true' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            use-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: Determine version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ needs.auto-tag.outputs.version }}" ]; then
            VERSION="${{ needs.auto-tag.outputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE="claude-lint-v${VERSION}-${TARGET}.tar.gz"

          cp "target/${TARGET}/release/claude-lint" .
          tar -czf "${ARCHIVE}" claude-lint
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-lint-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: [build, auto-tag]
    runs-on: ubuntu-latest
    if: >-
      github.ref_type == 'tag' ||
      needs.auto-tag.outputs.should-release == 'true' ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ needs.auto-tag.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHECKSUMS="claude-lint-v${VERSION}-checksums.txt"

          cd artifacts
          find . -mindepth 2 -name '*.tar.gz' -exec mv {} . \;
          sha256sum claude-lint-*.tar.gz > "${CHECKSUMS}"
          echo "CHECKSUMS=${CHECKSUMS}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd artifacts
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --generate-notes \
            claude-lint-*.tar.gz \
            "claude-lint-v${VERSION}-checksums.txt"
