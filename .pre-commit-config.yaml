# Pre-commit configuration
# Single source of truth for linter definitions.
# /relevant-checks uses: pre-commit run --files <changed-files> (scoped)
# Developers use: pre-commit install (opt-in git hook)

exclude: ^(\.venv/|node_modules/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]

  - repo: local
    hooks:
      - id: jsonlint
        name: Validate JSON files
        entry: bash -c 'for f; do jq . "$f" > /dev/null || exit 1; done' --
        language: system
        types: [json]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: cargo-fmt
        name: Rust format check
        entry: cargo fmt -- --check
        language: system
        pass_filenames: false
        files: '\.(rs)$|^Cargo\.(toml|lock)$|^rust-toolchain'
      - id: cargo-clippy
        name: Rust clippy lint
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        pass_filenames: false
        files: '\.(rs)$|^Cargo\.(toml|lock)$|^rust-toolchain'
